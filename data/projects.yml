- title: SiteGuardian
  year: 2024
  image: /static/images/siteguardian.jpg   # <- drop an image here (or keep a placeholder)
  desc: >
    A multi-sensor safety device with a real-time web dashboard for construction sites.
    Detects toxic gases, fire, extreme temperatures, and panic events to help managers
    respond faster and protect workers.

  stack:
    - Arduino (C/C++ via Arduino IDE)
    - Python
    - Firebase / Firestore (Realtime)
    - Web Dashboard

  role: Testing and Implementation Engineer
  links:
    demo: "https://youtu.be/Pgs2mwteLsQ?si=ObQujVzwK-z13dgl"  # <- YouTube walkthrough

  highlights:
    - Hardware + software prototype integrating multiple sensors with a live web dashboard.
    - Team collaboration across device, firmware, backend, and UI.
    - Real-time alarms delivered via Firestore based on thresholded sensor readings.

  device:
    outside:
      - Biodegradable plastic casing; non-flammable, eco-friendly
      - Belt-mount design
      - Panic button
      - Two LEDs:
      - Red: power / on-off feedback
      - Yellow: internet status (steady=connected, flicker=searching, off=not connected)
      - Ventilation shaft for air sampling
      - Exposed flame sensor for accuracy
    inside:
      sensors:
        - MQ9 Gas Sensor (CO, CH4)
        - DHT11 Temperature Sensor
        - Flame Sensor
        - Panic Button (triple-press detection)
        - ECG (planned)
        - Electric shock detection (planned)

  firmware:
    arduino:
      description: >
        Reads sensors and raises alarms when thresholds are exceeded.
        Sends events over serial (PC port) for the Python service to consume.
      thresholds:
        temperature_high_c: 40
        gas_ppm_high: 200
      triggers:
        - Fire detected (flame sensor)
        - CO/CH4 above threshold
        - Temperature too high / too low
        - Panic button pressed 3× within 5 seconds
      payload:
        alarm: true
        status_map:
          1: Panic button triggered
          2: Dangerous gas detected
          3: Fire detected
          4: Temperature too high
          5: Temperature too low
    python:
      description: >
        Reads serial data from the device and publishes alarm + reason to Firestore
        (Realtime Database) to drive the dashboard.

  lessons:
    - Stronger understanding of end-to-end prototyping (device → firmware → backend → UI)
    - Real-time data modeling in Firebase
    - Practical teamwork and scope management during a competition


