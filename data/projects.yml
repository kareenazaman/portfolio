- title: Orchid
  year: 2025
  category: "SQL Injection Detection – Personal Project"
  image: "/static/images/orchid1.png"
  gallery:
    - "/static/images/orchid3.png"
  stack:
    - Machine Learning
    - Logistic Regression
    - TF-IDF
    - FastAPI
    - PostgreSQL
    - Node.js
  desc: >
    <strong>Orchid</strong> is a machine learning model built for real-time <strong>SQL injection detection</strong> in web applications.
    It uses <strong>TF-IDF features</strong> and a <strong>Logistic Regression classifier</strong> to identify suspicious or obfuscated SQL queries.
    
    Orchid helps prevent security breaches by analyzing each query before it reaches the database, flagging any potential SQL injection attempts.
    
    The model processes SQL queries in <strong>under 5 milliseconds</strong> and achieved over <strong>90% accuracy</strong> on a noisy, obfuscated test set.
    
    Our future roadmap includes expanding Orchid to detect more complex attack patterns, integrating it with a broader security monitoring system, and improving its detection speed and scalability for enterprise-level applications.


- title: Lumi
  year: 2025
  category: "University Project – Property Management App"
  image: "/static/images/lumi.png"
  stack:
    - Firebase Authentication
    - Firebase Firestore
    - Firebase Storage
    - Flutter / React Native
    - Cloud Functions
  desc: >
    <strong>Lumi</strong> is a modern <strong>property management mobile application</strong> designed to 
    simplify rental management for <strong>landlords, property managers, and renters</strong>. 
    The app addresses real-world challenges such as <strong>unorganized rent collection</strong>, 
    <strong>scattered communication</strong>, <strong>lost maintenance requests</strong>, and 
    <strong>difficulty sharing important building updates</strong>.

    Lumi features a <strong>clean, interactive UI</strong> paired with <strong>secure Firebase Authentication</strong> 
    to ensure safe access for both managers and renters. All property, tenant, and rent data is 
    stored and synced in real time using <strong>Firestore</strong>, while <strong>Firebase Storage</strong> 
    handles documents, images, and media files such as maintenance photos and rent receipts.

    Key features include <strong>rent payment records</strong>, <strong>maintenance request tracking</strong>, 
    <strong>in-app messaging</strong>, a centralized <strong>announcement page</strong> for managers, 
    and an <strong>NFC smart door access system</strong> available in higher subscription tiers.

    Lumi follows a <strong>subscription-based model</strong> with Free, Standard, and Pro plans, 
    making it scalable for landlords managing anywhere from a single unit to medium-sized property portfolios.
    

