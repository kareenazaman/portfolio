- title: Jarvis
  year: 2025
  category: "Personal AI Assistant – Full-Stack Project"
  image: "/static/images/jarvis.jpg"
  stack:
    - Python
    - Flask
    - Local LLM (Ollama / Mistral)
    - YAML / Markdown
    - HTML / CSS / JavaScript
  desc: >
    <strong>Jarvis</strong> is a modular, retrieval-first <strong>AI personal assistant</strong> designed to
    understand and answer questions about my background, skills, and projects with accuracy and consistency.
    Instead of relying solely on generative responses, Jarvis prioritizes <strong>structured knowledge
    retrieval</strong> from YAML and Markdown sources to deliver grounded, portfolio-aware answers.

    The system uses a <strong>hybrid architecture</strong> combining intent detection, confidence gating,
    and retrieval fallback. For known portfolio questions (skills, projects, experience, contact details),
    Jarvis responds directly from curated data files, while an optional <strong>local LLM</strong> handles
    open-ended or conversational queries.

    Built with <strong>Flask</strong>, Jarvis is fully extensible and supports session-aware responses,
    memory-safe interactions, and future integrations such as voice input, scheduling, and task management.
    This project demonstrates my focus on <strong>AI reliability, system design, and real-world usability</strong>
    rather than black-box generation.




