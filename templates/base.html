<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="color-scheme" content="light">
  <title>{{ name }} | AI Portfolio</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='avatar.png') }}">



  <!-- Bootstrap for quick, reliable layout -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Optional: modern fonts for “tech serious + soft” vibe -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- Your custom styles (lives in /static/style.css) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=11">
</head>
<body class="bg-light hero-animate">

  <!-- Main outlet: pages insert their content here -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS (only if you later use dropdowns etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    window.STATIC_BASE = "{{ url_for('static', filename='') }}";
  </script>
  

  <!-- Small helper JS for smooth scroll (optional) -->
  <script>
    // Smooth-scroll for the hero pills (e.g., #projects)
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const id = a.getAttribute('href');
      const el = document.querySelector(id);
      if (!el) return;
      e.preventDefault();
      el.scrollIntoView({ behavior: 'smooth' });
    });
  </script>


<script src="{{ url_for('static', filename='main.js') }}" defer></script>
</body>
</html>
